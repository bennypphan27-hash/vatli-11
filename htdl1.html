<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ôn tập hệ thức độc lập số 1 - Lớp Lí cô Nguyên</title>
    
    <script>
        window.MathJax = { tex: { inlineMath: [['$', '$'], ['\\(', '\\)']] } };
    </script>
    <script id="MathJax-script" async src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js"></script>
    
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            line-height: 1.6; max-width: 600px; margin: 20px auto; padding: 15px; 
            background-color: #fce4ec;
            background-image: radial-gradient(#f8bbd0 1px, transparent 1px);
            background-size: 30px 30px;
        }
        
        h2 { color: #880e4f; text-align: center; }
        
        .info-box { background: #fff5f8; padding: 15px; border-radius: 15px; margin-bottom: 20px; border: 2px solid #f06292; }
        
        .question { 
            margin-bottom: 20px; padding: 15px; background: rgba(255, 255, 255, 0.8); 
            border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); 
            border-left: 5px solid #ec407a;
        }
        
        .feedback { display: none; margin-top: 10px; padding: 10px; border-radius: 5px; font-size: 0.95em; }
        
        #submit-btn { 
            padding: 15px; width: 100%; font-size: 18px; background-color: #d81b60; 
            color: white; border: none; border-radius: 10px; cursor: pointer; font-weight: bold; 
        }
        
        #result-area { 
            text-align: center; margin-top: 20px; font-size: 22px; font-weight: bold; 
            color: #880e4f; padding: 20px; background: #f8bbd0; border-radius: 15px; 
        }
        
        input[type="text"] { width: 92%; padding: 10px; margin-top: 5px; border: 1px solid #f06292; border-radius: 8px; }
    </style>
</head>
<body>

    <h2>🌸 Ôn tập hệ thức độc lập số 1 🌸</h2>
    <h4 style="text-align:center; color: #ad1457;">Lớp Lí cô Nguyên</h4>
    
    <div class="info-box">
        <label for="student-name"><b>Họ và tên học sinh:</b></label>
        <input type="text" id="student-name" placeholder="Nhập tên của em vào đây...">
    </div>

    <div id="quiz-container"></div>
    <button id="submit-btn" onclick="submitQuiz()">NỘP BÀI VÀ XEM KẾT QUẢ</button>
    <div id="result-area"></div>

    <script>
        const questions = [
            { q: "Một chất điểm dao động điều hòa với $A = 10$ cm. Khi $x = 6$ cm thì $v = 80$ cm/s. Tần số góc $\\omega$ là:", options: ["10 rad/s", "20 rad/s", "8 rad/s", "5 rad/s"], answer: 0, exp: "$\\omega = v / \\sqrt{A^2 - x^2} = 10$ rad/s." },
            { q: "Vật dao động điều hòa có $f = 5$ Hz, $A = 4$ cm. Tại $x = 2$ cm, vận tốc $v$ có độ lớn là:", options: ["$20\\pi\\sqrt{3}$ cm/s", "$40\\pi\\sqrt{3}$ cm/s", "$10\\pi\\sqrt{3}$ cm/s", "$30\\pi\\sqrt{3}$ cm/s"], answer: 0, exp: "$v = \\omega\\sqrt{A^2 - x^2} = 20\\pi\\sqrt{3}$ cm/s." },
            { q: "Vật dao động điều hòa trên quỹ đạo $L = 16$ cm. Tại VTCB, $v = 40$ cm/s. Tần số góc là:", options: ["5 rad/s", "10 rad/s", "2 rad/s", "20 rad/s"], answer: 0, exp: "$A = L/2 = 8$ cm. $\\omega = v_{max} / A = 5$ rad/s." },
            { q: "Vật có $x = 4\\cos(10t - \\pi/6)$ (cm). Vận tốc khi $x = 2$ cm là:", options: ["$\\pm 20\\sqrt{3}$ cm/s", "$\\pm 20$ cm/s", "$\\pm 40$ cm/s", "$\\pm 10\\sqrt{3}$ cm/s"], answer: 0, exp: "$v = \\pm \\omega\\sqrt{A^2 - x^2} = \\pm 20\\sqrt{3}$ cm/s." },
            { q: "Tại $t_1: x_1=4$ cm, $v_1=30$ cm/s. Tại $t_2: x_2=3$ cm, $v_2=40$ cm/s. Biên độ $A$ là:", options: ["4 cm", "5 cm", "6 cm", "7 cm"], answer: 1, exp: "Sử dụng $A^2 = x^2 + (v/\\omega)^2$, giải hệ ta được $A = 5$ cm." },
            { q: "Chu kỳ $T = 0,2\\pi$ s. Khi $x = 3$ cm thì $v = 40$ cm/s. Biên độ $A$ là:", options: ["4 cm", "5 cm", "6 cm", "7 cm"], answer: 1, exp: "$\\omega = 10$ rad/s. $A = 5$ cm." },
            { q: "$v_{max} = 100$ cm/s. Khi $x = 6$ cm thì $v = 80$ cm/s. Tần số góc $\\omega$ là:", options: ["10 rad/s", "20 rad/s", "5 rad/s", "25 rad/s"], answer: 0, exp: "Từ $v^2 = \\omega^2(A^2 - x^2)$, tính được $\\omega = 10$ rad/s." },
            { q: "$\\omega = 10$ rad/s. Khi $x = 2$ cm thì $v = 20\\sqrt{3}$ cm/s. Quỹ đạo $L$ là:", options: ["4 cm", "8 cm", "10 cm", "16 cm"], answer: 1, exp: "$A = \\sqrt{x^2 + (v/\\omega)^2} = 4$ cm. $L = 2A = 8$ cm." },
            { q: "$x = 8\\cos(5\\pi t + \\pi/4)$ (cm). Tại $x = 4$ cm, vận tốc $v$ có độ lớn là:", options: ["$20\\pi\\sqrt{3}$ cm/s", "$10\\pi\\sqrt{3}$ cm/s", "$40\\pi$ cm/s", "$20\\pi$ cm/s"], answer: 0, exp: "$v = \\omega\\sqrt{A^2 - x^2} = 20\\pi\\sqrt{3}$ cm/s." },
            { q: "Tại $t_1: x_1=3$ cm, $v_1=-60\\sqrt{3}$ cm/s. $t_2: x_2=3\\sqrt{2}$ cm, $v_2=60\\sqrt{2}$ cm/s. $A$ và $\\omega$ là:", options: ["6 cm; 20 rad/s", "6 cm; 12 rad/s", "12 cm; 20 rad/s", "12 cm; 10 rad/s"], answer: 0, exp: "Kết quả: $A = 6$ cm, $\\omega = 20$ rad/s." }
        ];

        const container = document.getElementById('quiz-container');
        questions.forEach((item, index) => {
            let html = `<div class="question"><p><b>Câu ${index + 1}:</b> ${item.q}</p>`;
            item.options.forEach((opt, i) => {
                html += `<input type="radio" name="q${index}" value="${i}"> ${opt}<br>`;
            });
            html += `<div id="f${index}" class="feedback"></div></div>`;
            container.innerHTML += html;
        });

        function submitQuiz() {
            const name = document.getElementById('student-name').value;
            if (name.trim() === "") {
                alert("Em vui lòng nhập tên trước khi nộp bài nhé!");
                return;
            }
            
            let score = 0;
            questions.forEach((item, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                const feedback = document.getElementById(`f${index}`);
                feedback.style.display = "block";
                
                if (selected && parseInt(selected.value) === item.answer) {
                    feedback.style.backgroundColor = "#d4edda";
                    feedback.innerHTML = "Chính xác! Giải thích: " + item.exp;
                    score++;
                } else {
                    feedback.style.backgroundColor = "#f8d7da";
                    feedback.innerHTML = "Sai rồi. Đáp án đúng: " + item.options[item.answer] + ". Giải thích: " + item.exp;
                }
            });
            document.getElementById('result-area').innerHTML = "✨ TỔNG ĐIỂM CỦA " + name.toUpperCase() + " : " + score + "/10";
            document.getElementById('submit-btn').style.display = "none";
            MathJax.typeset();
        }
    </script>
</body>
</html>

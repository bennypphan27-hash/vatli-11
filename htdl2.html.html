  <script>
        const questions = [
            { q: "Một chất điểm dao động điều hòa với $A = 10$ cm. Khi $x = 6$ cm thì $v = 80$ cm/s. Tần số góc $\\omega$ là:", options: ["10 rad/s", "20 rad/s", "8 rad/s", "5 rad/s"], answer: 0, exp: "$\\omega = v / \\sqrt{A^2 - x^2} = 10$ rad/s." },
            { q: "Vật dao động điều hòa có $f = 5$ Hz, $A = 4$ cm. Tại $x = 2$ cm, vận tốc $v$ có độ lớn là:", options: ["$20\\pi\\sqrt{3}$ cm/s", "$40\\pi\\sqrt{3}$ cm/s", "$10\\pi\\sqrt{3}$ cm/s", "$30\\pi\\sqrt{3}$ cm/s"], answer: 0, exp: "$v = \\omega\\sqrt{A^2 - x^2} = 20\\pi\\sqrt{3}$ cm/s." },
            { q: "Vật dao động điều hòa trên quỹ đạo $L = 16$ cm. Tại VTCB, $v = 40$ cm/s. Tần số góc là:", options: ["5 rad/s", "10 rad/s", "2 rad/s", "20 rad/s"], answer: 0, exp: "$A = L/2 = 8$ cm. $\\omega = v_{max} / A = 5$ rad/s." },
            { q: "Vật có $x = 4\\cos(10t - \\pi/6)$ (cm). Vận tốc khi $x = 2$ cm là:", options: ["$\\pm 20\\sqrt{3}$ cm/s", "$\\pm 20$ cm/s", "$\\pm 40$ cm/s", "$\\pm 10\\sqrt{3}$ cm/s"], answer: 0, exp: "$v = \\pm \\omega\\sqrt{A^2 - x^2} = \\pm 20\\sqrt{3}$ cm/s." },
            { q: "Tại $t_1: x_1=4$ cm, $v_1=30$ cm/s. Tại $t_2: x_2=3$ cm, $v_2=40$ cm/s. Biên độ $A$ là:", options: ["4 cm", "5 cm", "6 cm", "7 cm"], answer: 1, exp: "Sử dụng $A^2 = x^2 + (v/\\omega)^2$, giải hệ ta được $A = 5$ cm." },
            { q: "Chu kỳ $T = 0,2\\pi$ s. Khi $x = 3$ cm thì $v = 40$ cm/s. Biên độ $A$ là:", options: ["4 cm", "5 cm", "6 cm", "7 cm"], answer: 1, exp: "$\\omega = 10$ rad/s. $A = 5$ cm." },
            { q: "$v_{max} = 100$ cm/s. Khi $x = 6$ cm thì $v = 80$ cm/s. Tần số góc $\\omega$ là:", options: ["10 rad/s", "20 rad/s", "5 rad/s", "25 rad/s"], answer: 0, exp: "Từ $v^2 = \\omega^2(A^2 - x^2)$, tính được $\\omega = 10$ rad/s." },
            { q: "$\\omega = 10$ rad/s. Khi $x = 2$ cm thì $v = 20\\sqrt{3}$ cm/s. Quỹ đạo $L$ là:", options: ["4 cm", "8 cm", "10 cm", "16 cm"], answer: 1, exp: "$A = \\sqrt{x^2 + (v/\\omega)^2} = 4$ cm. $L = 2A = 8$ cm." },
            { q: "$x = 8\\cos(5\\pi t + \\pi/4)$ (cm). Tại $x = 4$ cm, vận tốc $v$ có độ lớn là:", options: ["$20\\pi\\sqrt{3}$ cm/s", "$10\\pi\\sqrt{3}$ cm/s", "$40\\pi$ cm/s", "$20\\pi$ cm/s"], answer: 0, exp: "$v = \\omega\\sqrt{A^2 - x^2} = 20\\pi\\sqrt{3}$ cm/s." },
            { q: "Tại $t_1: x_1=3$ cm, $v_1=-60\\sqrt{3}$ cm/s. $t_2: x_2=3\\sqrt{2}$ cm, $v_2=60\\sqrt{2}$ cm/s. $A$ và $\\omega$ là:", options: ["6 cm; 20 rad/s", "6 cm; 12 rad/s", "12 cm; 20 rad/s", "12 cm; 10 rad/s"], answer: 0, exp: "Kết quả: $A = 6$ cm, $\\omega = 20$ rad/s." }
        ];

        const container = document.getElementById('quiz-container');
        questions.forEach((item, index) => {
            let html = `<div class="question-card bg-white/80 rounded-2xl p-4 mb-4 shadow-md">
                <p class="font-medium mb-3"><b>Câu ${index + 1}:</b> ${item.q}</p>`;
            item.options.forEach((opt, i) => {
                html += `<label class="flex items-center gap-2 py-1 cursor-pointer hover:bg-pink-50 px-2 rounded-lg">
                    <input type="radio" name="q${index}" value="${i}" class="accent-pink-600 w-4 h-4"> 
                    <span>${opt}</span>
                </label>`;
            });
            html += `<div id="f${index}" class="feedback mt-3 p-3 rounded-lg text-sm"></div></div>`;
            container.innerHTML += html;
        });

        if (window.MathJax && MathJax.typeset) MathJax.typeset();

        function submitQuiz() {
            const name = document.getElementById('student-name').value.trim();
            if (!name) {
                const nameInput = document.getElementById('student-name');
                nameInput.classList.add('ring-2', 'ring-red-400');
                nameInput.focus();
                return;
            }

            let score = 0;
            questions.forEach((item, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                const feedback = document.getElementById(`f${index}`);
                feedback.classList.add('show');

                if (selected && parseInt(selected.value) === item.answer) {
                    feedback.style.backgroundColor = "#d4edda";
                    feedback.style.color = "#155724";
                    feedback.innerHTML = "✓ Chính xác! " + item.exp;
                    score++;
                } else {
                    feedback.style.backgroundColor = "#f8d7da";
                    feedback.style.color = "#721c24";
                    feedback.innerHTML = "✗ Sai. Đáp án: " + item.options[item.answer] + ". " + item.exp;
                }
            });

            const resultArea = document.getElementById('result-area');
            resultArea.classList.remove('hidden');
            resultArea.textContent = "🌸 " + name.toUpperCase() + ": " + score + "/10 🌸";
            document.getElementById('submit-btn').style.display = "none";

            // Disable all radios
            document.querySelectorAll('input[type="radio"]').forEach(r => r.disabled = true);

            if (window.MathJax && MathJax.typeset) MathJax.typeset();
            resultArea.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
